<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="1400" fill="url(#bg2)"/>
  <!-- Headphones icon -->
  <g transform="translate(700, 500)" fill="none" stroke="#f5af19" stroke-width="12">
    <path d="M-180,80 C-180,-100 180,-100 180,80" stroke-linecap="round"/>
    <rect x="-220" y="60" width="80" height="140" rx="20" fill="#f5af19" opacity="0.7" stroke="none"/>
    <rect x="140" y="60" width="80" height="140" rx="20" fill="#f5af19" opacity="0.7" stroke="none"/>
  </g>
  <!-- Stars/sparkles -->
  <text x="400" y="350" font-size="60" fill="#f5af19" opacity="0.4">✦</text>
  <text x="1050" y="400" font-size="40" fill="#f5af19" opacity="0.3">✦</text>
  <text x="300" y="800" font-size="30" fill="#f5af19" opacity="0.2">✦</text>
  <text x="1100" y="750" font-size="50" fill="#f5af19" opacity="0.3">✦</text>
  <!-- Text -->
  <text x="700" y="950" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="140" fill="#ffffff">DONNA'S</text>
  <text x="700" y="1100" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="140" fill="#f5af19">PICKS</text>
  <text x="700" y="1200" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-weight="300" font-size="50" fill="#ffffff" opacity="0.5">podcast episodes, curated</text>
</svg>
