<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1400" viewBox="0 0 1400 1400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="neon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="neonVert" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="30" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="1400" height="1400" fill="url(#bg)"/>

  <!-- Ambient glow blobs -->
  <circle cx="400" cy="400" r="300" fill="#8b5cf6" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="1000" cy="600" r="250" fill="#06b6d4" opacity="0.04" filter="url(#bigGlow)"/>
  <circle cx="700" cy="900" r="200" fill="#ec4899" opacity="0.03" filter="url(#bigGlow)"/>

  <!-- Central play button (clean, modern) -->
  <g transform="translate(700, 440)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="160" fill="none" stroke="url(#neon)" stroke-width="3" opacity="0.2"/>
    <!-- Inner filled circle -->
    <circle cx="0" cy="0" r="120" fill="#ffffff" opacity="0.03"/>
    <!-- Play triangle -->
    <g filter="url(#neonGlow)">
      <polygon points="-40,-60 -40,60 60,0" fill="url(#neon)" opacity="0.85"/>
    </g>
  </g>

  <!-- Audio waveform bars (centered, symmetric) -->
  <g transform="translate(700, 700)" filter="url(#neonGlow)" opacity="0.5">
    <rect x="-300" y="-15" width="8" height="30" rx="4" fill="url(#neonVert)"/>
    <rect x="-275" y="-35" width="8" height="70" rx="4" fill="url(#neonVert)"/>
    <rect x="-250" y="-20" width="8" height="40" rx="4" fill="url(#neonVert)"/>
    <rect x="-225" y="-50" width="8" height="100" rx="4" fill="url(#neonVert)"/>
    <rect x="-200" y="-30" width="8" height="60" rx="4" fill="url(#neonVert)"/>
    <rect x="-175" y="-45" width="8" height="90" rx="4" fill="url(#neonVert)"/>
    <rect x="-150" y="-25" width="8" height="50" rx="4" fill="url(#neonVert)"/>
    <rect x="-125" y="-55" width="8" height="110" rx="4" fill="url(#neonVert)"/>
    <rect x="-100" y="-40" width="8" height="80" rx="4" fill="url(#neonVert)"/>
    <rect x="-75" y="-60" width="8" height="120" rx="4" fill="url(#neonVert)"/>
    <rect x="-50" y="-45" width="8" height="90" rx="4" fill="url(#neonVert)"/>
    <rect x="-25" y="-70" width="8" height="140" rx="4" fill="url(#neonVert)"/>
    <rect x="0" y="-55" width="8" height="110" rx="4" fill="url(#neonVert)"/>
    <rect x="25" y="-70" width="8" height="140" rx="4" fill="url(#neonVert)"/>
    <rect x="50" y="-45" width="8" height="90" rx="4" fill="url(#neonVert)"/>
    <rect x="75" y="-60" width="8" height="120" rx="4" fill="url(#neonVert)"/>
    <rect x="100" y="-40" width="8" height="80" rx="4" fill="url(#neonVert)"/>
    <rect x="125" y="-55" width="8" height="110" rx="4" fill="url(#neonVert)"/>
    <rect x="150" y="-25" width="8" height="50" rx="4" fill="url(#neonVert)"/>
    <rect x="175" y="-45" width="8" height="90" rx="4" fill="url(#neonVert)"/>
    <rect x="200" y="-30" width="8" height="60" rx="4" fill="url(#neonVert)"/>
    <rect x="225" y="-50" width="8" height="100" rx="4" fill="url(#neonVert)"/>
    <rect x="250" y="-20" width="8" height="40" rx="4" fill="url(#neonVert)"/>
    <rect x="275" y="-35" width="8" height="70" rx="4" fill="url(#neonVert)"/>
    <rect x="300" y="-15" width="8" height="30" rx="4" fill="url(#neonVert)"/>
  </g>

  <!-- Title -->
  <text x="700" y="900" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="900" font-size="110" fill="#ffffff" letter-spacing="3" filter="url(#shadow)">AI FEED</text>

  <!-- Thin divider -->
  <rect x="520" y="940" width="360" height="2" rx="1" fill="url(#neon)" opacity="0.3"/>

  <!-- Subtitle -->
  <text x="700" y="1000" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="400" font-size="30" fill="#ffffff" opacity="0.4" letter-spacing="10">YOUTUBE → AUDIO</text>

  <!-- Creator names in pill badges -->
  <g transform="translate(700, 1080)">
    <rect x="-320" y="-18" width="120" height="36" rx="18" fill="#ffffff" opacity="0.05"/>
    <text x="-260" y="7" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#ffffff" opacity="0.4">OTTLEY</text>

    <rect x="-170" y="-18" width="100" height="36" rx="18" fill="#ffffff" opacity="0.05"/>
    <text x="-120" y="7" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#ffffff" opacity="0.4">HERK</text>

    <rect x="-40" y="-18" width="120" height="36" rx="18" fill="#ffffff" opacity="0.05"/>
    <text x="20" y="7" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#ffffff" opacity="0.4">ONDREJ</text>

    <rect x="110" y="-18" width="110" height="36" rx="18" fill="#ffffff" opacity="0.05"/>
    <text x="165" y="7" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#ffffff" opacity="0.4">WOLFE</text>

    <rect x="250" y="-18" width="90" height="36" rx="18" fill="#ffffff" opacity="0.05"/>
    <text x="295" y="7" text-anchor="middle" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#ffffff" opacity="0.4">FINN</text>
  </g>
</svg>
